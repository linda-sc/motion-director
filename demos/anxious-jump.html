<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anxious jump — frame sequence + playback</title>
<style>
  :root { --stage:#f7fbff; --red:#ef4444; --ink:#172033; --grid:#e7eef8; --grid2:#cfe0f6; --lab:#5b6b82; }
  body { margin:0; background:#fff; font-family: ui-sans-serif, system-ui, sans-serif; color:var(--ink); }
  h2 { font-size:18px; font-weight:500; margin:14px 16px 8px; }
  #play-wrap { padding:0 16px 6px; }
  svg.play { width:460px; background:var(--stage); border:1px solid #dbe7f5; border-radius:10px; display:block; }
  #frame-tag { font-size:14px; color:var(--lab); margin:6px 0 0; }
  #sheet { display:flex; flex-wrap:wrap; gap:8px; padding:6px 16px 24px; }
  .cell { width:300px; }
  .cell h3 { font-size:13px; font-weight:500; margin:0 0 3px; }
  svg.mini { width:300px; background:var(--stage); border:1px solid #dbe7f5; border-radius:8px; display:block; }
  .gl { stroke:var(--grid); stroke-width:0.7; } .gl.maj { stroke:var(--grid2); stroke-width:1; }
  .glab { fill:var(--lab); font-size:13px; }
  .limb { fill: rgba(255,255,255,0.5); stroke:var(--red); stroke-width:2; stroke-linejoin:round; }
  .bone { stroke:#334155; stroke-width:1.6; stroke-linecap:round; }
</style>
</head>
<body>
<h2>Playback (stepped, looping)</h2>
<div id="play-wrap">
  <svg class="play" id="play" viewBox="0 0 900 720" xmlns="http://www.w3.org/2000/svg"></svg>
  <p id="frame-tag"></p>
</div>
<h2>Frame sheet (coherence check)</h2>
<div id="sheet"></div>
<script>
const f = (n)=>Number(n.toFixed(1));
const dist=(a,b)=>Math.max(1,Math.hypot(b.x-a.x,b.y-a.y));
const unit=(a,b)=>{const l=dist(a,b);return{x:(b.x-a.x)/l,y:(b.y-a.y)/l};};
const add=(p,v,s)=>({x:p.x+v.x*s,y:p.y+v.y*s});
const off=(p,x,y)=>({x:p.x+x,y:p.y+y});
const mid=(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
const S=(arr)=>arr.map(p=>`${f(p.x)},${f(p.y)}`).join(" ");
function limb(s,e,sw,ew){const ax=unit(s,e),n={x:-ax.y,y:ax.x},c=mid(s,e),hd=(sw+ew)/4;
  return S([add(s,n,sw/2),add(c,n,hd),add(e,n,ew/2),add(e,n,-ew/2),add(c,n,-hd),add(s,n,-sw/2)]);}
function torso(p){const t={ls:off(p.leftShoulder,-13,-8),rs:off(p.rightShoulder,16,-8),rr:off(p.chest,43,12),
  rw:off(p.stomach,27,20),rh:off(p.rightHip,30,23),pt:off(p.hips,0,54),lh:off(p.leftHip,-30,23),
  lw:off(p.stomach,-27,20),lr:off(p.chest,-43,12)};return S([t.ls,t.rs,t.rr,t.rw,t.rh,t.pt,t.lh,t.lw,t.lr]);}
const neck=(p)=>S([off(p.neck,-15,-4),off(p.neck,15,-4),off(p.neck,12,26),off(p.neck,-12,26)]);
const head=(h)=>S([off(h,-33,-48),off(h,30,-42),off(h,42,-5),off(h,6,47),off(h,-41,10)]);
function hand(el,h){const ax=unit(el,h),n={x:-ax.y,y:ax.x};
  return S([add(add(h,ax,-12),n,10),add(add(h,ax,6),n,16),add(add(h,ax,25),n,1),add(add(h,ax,6),n,-16),add(add(h,ax,-12),n,-11)]);}
function foot(kn,ft,d){const ax=unit(kn,ft),n={x:-ax.y,y:ax.x},fw=unit(ft,{x:ft.x+d*48,y:ft.y+8}),tb=add(ft,fw,28),tt=add(ft,fw,43);
  return S([add(add(ft,ax,-14),n,11),add(tt,n,5),add(tt,n,-8),add(tb,n,-14),add(add(ft,ax,-18),n,-4)]);}
function polys(p){return [
  limb(p.leftShoulder,p.leftElbow,24,18),limb(p.leftElbow,p.leftHand,18,13),
  limb(p.leftHip,p.leftKnee,28,21),limb(p.leftKnee,p.leftFoot,21,15),
  limb(p.rightShoulder,p.rightElbow,25,18),limb(p.rightHip,p.rightKnee,29,21),
  torso(p),neck(p),head(p.head),limb(p.rightElbow,p.rightHand,18,13),
  hand(p.leftElbow,p.leftHand),hand(p.rightElbow,p.rightHand),
  limb(p.rightKnee,p.rightFoot,21,15),foot(p.leftKnee,p.leftFoot,-1),foot(p.rightKnee,p.rightFoot,1)];}
const NODES=["head","neck","chest","stomach","hips","leftShoulder","rightShoulder","leftElbow","rightElbow","leftHand","rightHand","leftHip","rightHip","leftKnee","rightKnee","leftFoot","rightFoot"];
const EDGES=[["head","neck"],["neck","chest"],["chest","stomach"],["stomach","hips"],["neck","leftShoulder"],["neck","rightShoulder"],["leftShoulder","leftElbow"],["leftElbow","leftHand"],["rightShoulder","rightElbow"],["rightElbow","rightHand"],["hips","leftHip"],["hips","rightHip"],["leftHip","leftKnee"],["leftKnee","leftFoot"],["rightHip","rightKnee"],["rightKnee","rightFoot"]];
function grid(W,H,labels){let g="";for(let x=0;x<=W;x+=50){const m=x%100===0;g+=`<line class="gl ${m?'maj':''}" x1="${x}" y1="0" x2="${x}" y2="${H}"/>`;if(m&&labels)g+=`<text class="glab" x="${x+2}" y="14">${x}</text>`;}
  for(let y=0;y<=H;y+=50){const m=y%100===0;g+=`<line class="gl ${m?'maj':''}" x1="0" y1="${y}" x2="${W}" y2="${y}"/>`;if(m&&labels&&y>0)g+=`<text class="glab" x="3" y="${y-3}">${y}</text>`;}return g;}
function figure(p){return polys(p).map(pp=>`<polygon class="limb" points="${pp}"/>`).join("")
  +EDGES.map(([a,b])=>`<line class="bone" x1="${p[a].x}" y1="${p[a].y}" x2="${p[b].x}" y2="${p[b].y}"/>`).join("")
  +NODES.map(k=>`<circle cx="${p[k].x}" cy="${p[k].y}" r="4" fill="#334155"/>`).join("");}

// ===== FRAMES =====
const FRAMES = [
  {label:"1 · calm", hold:300, pose:{head:{x:450,y:156},neck:{x:450,y:214},chest:{x:450,y:256},stomach:{x:450,y:326},hips:{x:450,y:398},leftShoulder:{x:394,y:238},rightShoulder:{x:506,y:238},leftElbow:{x:414,y:324},rightElbow:{x:548,y:324},leftHand:{x:387,y:393},rightHand:{x:508,y:393},leftHip:{x:416,y:398},rightHip:{x:484,y:398},leftKnee:{x:386,y:536},rightKnee:{x:522,y:532},leftFoot:{x:360,y:672},rightFoot:{x:548,y:668}}},
  {label:"2 · anticipation (crouch)", hold:140, pose:{head:{x:452,y:184},neck:{x:450,y:240},chest:{x:450,y:284},stomach:{x:452,y:352},hips:{x:450,y:428},leftShoulder:{x:394,y:268},rightShoulder:{x:506,y:268},leftElbow:{x:410,y:352},rightElbow:{x:552,y:352},leftHand:{x:384,y:420},rightHand:{x:512,y:420},leftHip:{x:416,y:428},rightHip:{x:484,y:428},leftKnee:{x:384,y:548},rightKnee:{x:524,y:544},leftFoot:{x:360,y:672},rightFoot:{x:548,y:668}}},
  {label:"3 · launch", hold:80, pose:{head:{x:438,y:118},neck:{x:444,y:176},chest:{x:448,y:220},stomach:{x:452,y:290},hips:{x:454,y:360},leftShoulder:{x:396,y:184},rightShoulder:{x:504,y:196},leftElbow:{x:380,y:150},rightElbow:{x:540,y:250},leftHand:{x:350,y:96},rightHand:{x:580,y:300},leftHip:{x:424,y:360},rightHip:{x:488,y:360},leftKnee:{x:410,y:470},rightKnee:{x:510,y:475},leftFoot:{x:392,y:560},rightFoot:{x:540,y:575}}},
  {label:"4 · apex (held)", hold:360, pose:{head:{x:430,y:70},neck:{x:440,y:128},chest:{x:446,y:170},stomach:{x:452,y:238},hips:{x:458,y:308},leftShoulder:{x:396,y:130},rightShoulder:{x:502,y:156},leftElbow:{x:362,y:78},rightElbow:{x:556,y:230},leftHand:{x:336,y:30},rightHand:{x:600,y:300},leftHip:{x:426,y:308},rightHip:{x:494,y:308},leftKnee:{x:416,y:392},rightKnee:{x:512,y:430},leftFoot:{x:444,y:436},rightFoot:{x:530,y:540}}},
  {label:"5 · falling", hold:110, pose:{head:{x:438,y:120},neck:{x:444,y:176},chest:{x:448,y:218},stomach:{x:452,y:288},hips:{x:456,y:360},leftShoulder:{x:398,y:180},rightShoulder:{x:502,y:200},leftElbow:{x:378,y:150},rightElbow:{x:548,y:270},leftHand:{x:360,y:110},rightHand:{x:584,y:330},leftHip:{x:426,y:360},rightHip:{x:490,y:360},leftKnee:{x:414,y:470},rightKnee:{x:510,y:475},leftFoot:{x:430,y:560},rightFoot:{x:528,y:575}}},
  {label:"6 · landing compress", hold:90, pose:{head:{x:466,y:186},neck:{x:456,y:236},chest:{x:454,y:278},stomach:{x:452,y:346},hips:{x:452,y:420},leftShoulder:{x:402,y:250},rightShoulder:{x:512,y:252},leftElbow:{x:408,y:332},rightElbow:{x:540,y:332},leftHand:{x:416,y:392},rightHand:{x:520,y:392},leftHip:{x:416,y:420},rightHip:{x:488,y:420},leftKnee:{x:380,y:556},rightKnee:{x:528,y:552},leftFoot:{x:352,y:672},rightFoot:{x:556,y:668}}},
  {label:"7 · anxious settle", hold:520, pose:{head:{x:460,y:180},neck:{x:452,y:228},chest:{x:452,y:270},stomach:{x:450,y:338},hips:{x:450,y:408},leftShoulder:{x:400,y:248},rightShoulder:{x:510,y:248},leftElbow:{x:412,y:330},rightElbow:{x:538,y:332},leftHand:{x:432,y:288},rightHand:{x:516,y:360},leftHip:{x:416,y:408},rightHip:{x:484,y:408},leftKnee:{x:384,y:548},rightKnee:{x:524,y:544},leftFoot:{x:356,y:672},rightFoot:{x:552,y:668}}},
];

// contact sheet
document.getElementById("sheet").innerHTML = FRAMES.map(fr=>
  `<div class="cell"><h3>${fr.label}</h3><svg class="mini" viewBox="0 0 900 720">${grid(900,720,true)}${figure(fr.pose)}</svg></div>`
).join("");

// playback (stepped, looping with a pause)
const play=document.getElementById("play"), tag=document.getElementById("frame-tag");
const gridLayer=grid(900,720,false);
let i=0;
function step(){
  const fr=FRAMES[i];
  play.innerHTML=gridLayer+figure(fr.pose);
  tag.textContent=`${fr.label}  ·  hold ${fr.hold}ms`;
  const last=i===FRAMES.length-1;
  i=(i+1)%FRAMES.length;
  setTimeout(step, last ? 700 : fr.hold);
}
step();
</script>
</body>
</html>
